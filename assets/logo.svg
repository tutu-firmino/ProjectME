<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <title>ProjectME logo</title>
  <style>
    .logo-text { font-family: ui-monospace, 'Cascadia Code', 'Courier New', monospace; }
    .txt-main { fill: #111; }
    .txt-blue { fill: #4A90D9; }
    @media (prefers-color-scheme: dark) {
      .txt-main { fill: #f0f0f0; }
    }
  </style>
  <text x="240" y="82" class="logo-text txt-main" font-size="64" font-weight="700" text-anchor="middle">Project<tspan class="txt-blue">ME</tspan></text>
</svg>